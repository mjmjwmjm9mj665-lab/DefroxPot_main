<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DefroxPot — Access Terminal</title>
    <meta name="description" content="DefroxPot Honeypot — Secure login to the cyber threat monitoring command center.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-void: #050505;
            --neon-purple: #bc13fe;
            --neon-blue: #0ff;
            --neon-green: #39ff14;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --text-muted: #555;
            --border-dark: #1a1a1a;
            --font-mono: 'JetBrains Mono', monospace;
            --font-display: 'Orbitron', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-void);
            color: var(--text-primary);
            font-family: var(--font-mono);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated grid */
        body::before {
            content: '';
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image:
                linear-gradient(rgba(188,19,254,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(188,19,254,0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Scanning line */
        body::after {
            content: '';
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 3px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-purple), transparent);
            box-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--neon-purple);
            animation: scanLine 4s ease-in-out infinite;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.7;
        }

        @keyframes scanLine {
            0% { top: 0; opacity: 0.7; }
            50% { top: 100vh; opacity: 0.4; }
            100% { top: 0; opacity: 0.7; }
        }

        /* Ambient glow orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
        }
        .orb-1 { width: 300px; height: 300px; background: rgba(188,19,254,0.08); top: 10%; left: 15%; animation: orbFloat 8s ease-in-out infinite; }
        .orb-2 { width: 250px; height: 250px; background: rgba(0,255,255,0.06); bottom: 15%; right: 10%; animation: orbFloat 10s ease-in-out infinite reverse; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -20px); }
        }

        /* Login container */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 0 1rem;
            animation: springFall 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes springFall {
            0% { opacity: 0; transform: translateY(-60px) scale(0.95); }
            60% { opacity: 1; transform: translateY(8px) scale(1.02); }
            80% { transform: translateY(-3px) scale(0.99); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-card {
            background: rgba(13, 13, 13, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-dark);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue), var(--neon-purple));
            animation: borderPulse 3s ease-in-out infinite;
        }

        @keyframes borderPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .login-card::after {
            content: '';
            position: absolute; inset: 0;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(188,19,254,0.1), transparent, rgba(0,255,255,0.1));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* Glitch logo */
        .glitch-logo {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue), 0 0 40px var(--neon-purple);
            position: relative;
            display: inline-block;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .glitch-logo::before,
        .glitch-logo::after {
            content: attr(data-text);
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
        }

        .glitch-logo::before {
            color: var(--neon-purple);
            animation: glitch1 3s infinite linear alternate-reverse;
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            text-shadow: -2px 0 #ff2d95;
        }

        .glitch-logo::after {
            color: var(--neon-green);
            animation: glitch2 2s infinite linear alternate-reverse;
            clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
            text-shadow: 2px 0 var(--neon-blue);
        }

        @keyframes glitch1 {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(3px, -1px); }
            60% { transform: translate(-1px, 1px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        @keyframes glitch2 {
            0% { transform: translate(0); }
            25% { transform: translate(2px, -1px); }
            50% { transform: translate(-2px, 2px); }
            75% { transform: translate(1px, -1px); }
            100% { transform: translate(0); }
        }

        .login-subtitle {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }

        /* Form elements */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid var(--border-dark);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(188,19,254,0.2);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .login-btn {
            width: 100%;
            padding: 0.8rem;
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            background: linear-gradient(135deg, var(--neon-purple), rgba(0,255,255,0.6));
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(188,19,254,0.4), 0 0 40px rgba(0,255,255,0.2);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* Alert messages */
        .cyber-alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid;
            position: relative;
            z-index: 10;
        }

        .cyber-alert-error {
            background: rgba(255,51,51,0.08);
            border-color: rgba(255,51,51,0.2);
            color: #ff6b6b;
        }

        .cyber-alert-success {
            background: rgba(57,255,20,0.08);
            border-color: rgba(57,255,20,0.2);
            color: var(--neon-green);
        }

        .cyber-alert-info {
            background: rgba(0,255,255,0.08);
            border-color: rgba(0,255,255,0.2);
            color: var(--neon-blue);
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-container">
        {% for message in messages %}
        <div class="cyber-alert {% if message.tags == 'error' %}cyber-alert-error{% elif message.tags == 'success' %}cyber-alert-success{% else %}cyber-alert-info{% endif %}">
            ⚠ {{ message }}
        </div>
        {% endfor %}

        <div class="login-card">
            <!-- Logo -->
            <div style="text-align: center; margin-bottom: 2rem;">
                <span class="glitch-logo" data-text="DefroxPot">DefroxPot</span>
                <p class="login-subtitle">Secure Access Terminal</p>
            </div>

            <form action="/login" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label" for="loginusername">
                        ◆ Username
                    </label>
                    <input class="form-input" id="loginusername" name="loginusername" type="text" placeholder="Enter username..." autocomplete="username" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="loginpassword">
                        ◆ Password
                    </label>
                    <input class="form-input" id="loginpassword" name="loginpassword" type="password" placeholder="••••••••••••" autocomplete="current-password" required>
                </div>

                <button class="login-btn" type="submit">
                    ⏻ Initialize Session
                </button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem;">
                <p style="font-size: 0.65rem; color: var(--text-muted); letter-spacing: 1px;">
                    AUTHORIZED PERSONNEL ONLY
                </p>
            </div>
        </div>
    </div>
</body>
</html>
