<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    
    <style>
        /* Modern Background Gradient */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            padding: 40px 0;
        }

        /* Glassmorphism Card Effect */
        .login-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 50px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: white;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }

        /* Button Animation */
        .btn-custom {
            background: #fff;
            color: #764ba2;
            font-weight: bold;
            border-radius: 10px;
            border: none;
            padding: 12px 30px;
            transition: all 0.3s ease;
            display: inline-block;
            text-decoration: none;
        }

        .btn-custom:hover {
            background: #764ba2;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            text-decoration: none;
        }

        /* Floating Shapes for Background decoration */
        .shape {
            position: fixed;
            z-index: -1;
            filter: blur(80px);
        }
        
        h1.error-code {
            font-size: 6rem;
            font-weight: 800;
            margin: 0;
            line-height: 1;
            text-shadow: 0 5px 15px rgba(0,0,0,0.2);
            color: rgba(255,255,255,0.9);
        }
    </style>
</head>
<body onload="myFunction()">

    <!-- Animated blobs -->
    <div class="shape" style="top: 10%; left: 10%; width: 300px; height: 300px; background: #ff0080; border-radius: 50%;"></div>
    <div class="shape" style="bottom: 10%; right: 10%; width: 400px; height: 400px; background: #00dbde; border-radius: 50%;"></div>

    <div class="container d-flex justify-content-center">
        <div class="login-card animate__animated animate__fadeInUp">
            
            <h1 class="error-code mb-2">404</h1>
            <h2 class="mb-3">Page Not Found</h2>
            <p class="mb-5" style="color: rgba(255,255,255,0.8);">Sorry, the page you are looking for might have been removed or its name changed.</p>
            
            <a href="{{ url_for('login') }}" class="btn-custom">Back to home</a>
        </div>
    </div>

    <!-- Bootstrap JS (Optional) -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/script.js"></script>
</body>
</html>
